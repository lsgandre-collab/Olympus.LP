<svg viewBox="0 0 280 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="OLYMPUS">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af77"/>
      <stop offset="50%" stop-color="#f0d9a0"/>
      <stop offset="100%" stop-color="#d4af77"/>
    </linearGradient>
    <filter id="red-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#b91c1c" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <text x="0" y="36" fill="url(#gold)" filter="url(#red-glow)" font-family="Cinzel, Georgia, serif" font-weight="900" font-size="42" letter-spacing="-0.02em">OLYMPUS</text>
</svg>
